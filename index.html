<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<!--
  Content Security Policy: defense in depth.
  * default-src none  : nothing loads unless explicitly allowed below.
  * script-src sha256  : ONLY this app's own inline code (pinned by a cryptographic
                         hash) may run. Any injected or swapped-in code, plus dynamic
                         code execution, is refused by the browser.
  * connect-src none  : no network requests of any kind, so the app cannot phone home
                        or send the child's data anywhere. (Standard Notes save/load
                        uses postMessage, which CSP does not restrict, so it still works.)
  * img/font/object/etc none : no external or data resources are loaded.
  * base-uri / form-action none : block base-tag and form hijacking tricks.
-->
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'sha256-9X2rQHZT8mb0oVqTTe/yw8pdJcVLOFnr5cGVv/ANeyM='; style-src 'unsafe-inline'; img-src 'none'; font-src 'none'; media-src 'none'; connect-src 'none'; base-uri 'none'; form-action 'none'; frame-src 'none'; child-src 'none'; worker-src 'none'; object-src 'none'; manifest-src 'none'" />
<meta name="referrer" content="no-referrer" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Math Tutor</title>
<style>
  :root{
    /* These fall back for standalone use; Standard Notes overrides them with the active theme. */
    --bg: var(--sn-stylekit-background-color, #f7f9fc);
    --fg: var(--sn-stylekit-foreground-color, #1f2937);
    --panel: var(--sn-stylekit-contrast-background-color, #ffffff);
    --border: var(--sn-stylekit-border-color, #e3e8ef);
    --muted: var(--sn-stylekit-neutral-color, #6b7280);
    --font: var(--sn-stylekit-editor-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif);
    /* Fun accents (kid palette) */
    --accent:#3b82f6; --accent2:#8b5cf6; --good:#16a34a; --good-bg:#dcfce7;
    --bad:#d97706; --bad-bg:#fef3c7; --star:#f59e0b; --shadow:0 2px 0 rgba(0,0,0,.08);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%}
  body{
    background:var(--bg); color:var(--fg); font-family:var(--font);
    -webkit-text-size-adjust:100%; line-height:1.35;
  }
  #root{max-width:680px;margin:0 auto;padding:16px 14px 28px}

  /* ---------- Home ---------- */
  .hero{text-align:center;padding:10px 6px 14px}
  .hero-title{font-size:1.5rem;font-weight:800}
  .hero-stars{margin-top:6px;font-size:1.05rem;color:var(--muted)}
  .hero-stars b{color:var(--star)}
  .section{font-size:1.05rem;margin:18px 4px 8px;font-weight:800}
  .section .sub{font-weight:500;color:var(--muted);font-size:.85rem}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
  @media(min-width:520px){.grid{grid-template-columns:repeat(3,1fr)}}
  .card{
    appearance:none;border:2px solid var(--border);background:var(--panel);color:var(--fg);
    border-radius:18px;padding:14px 10px 12px;cursor:pointer;text-align:center;
    display:flex;flex-direction:column;align-items:center;gap:4px;box-shadow:var(--shadow);
    transition:transform .06s ease, border-color .15s;
  }
  .card:active{transform:translateY(2px) scale(.98)}
  .card:hover{border-color:var(--accent)}
  .card-emoji{font-size:2.1rem;line-height:1}
  .card-label{font-weight:800;font-size:1.02rem}
  .card-level{display:flex;gap:4px;margin-top:2px}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--border)}
  .dot.on{background:var(--accent)}
  .card-meta{font-size:.78rem;color:var(--muted)}
  .testlink{
    margin-top:8px;font-size:.74rem;border:none;background:transparent;color:var(--accent2);
    cursor:pointer;text-decoration:underline;padding:4px;
  }
  .parent-note{margin:22px 6px 0;font-size:.82rem;color:var(--muted);text-align:center}

  /* ---------- Practice ---------- */
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px}
  .back,.hint{
    appearance:none;border:2px solid var(--border);background:var(--panel);color:var(--fg);
    border-radius:12px;padding:8px 12px;font-size:.9rem;font-weight:700;cursor:pointer;
  }
  .hint{border-color:#fcd34d;background:#fffbeb;color:#92400e}
  .topic-name{font-weight:800;font-size:1.05rem}
  .practbar,.testbar{
    text-align:center;font-size:.85rem;color:var(--muted);margin:2px 0 10px;
    background:var(--panel);border:1px solid var(--border);border-radius:999px;padding:5px 10px
  }
  .testbar{color:var(--accent2);border-color:var(--accent2)}
  .practbar{display:flex;align-items:center;justify-content:center;gap:10px}
  .lvlbtn{appearance:none;cursor:pointer;border:2px solid var(--accent);background:var(--panel);
    color:var(--accent);font-weight:800;border-radius:10px;width:34px;height:34px;font-size:1rem;line-height:1}
  .lvlbtn:active{transform:translateY(1px)}
  .lvlbtn:disabled{opacity:.3;cursor:default;border-color:var(--border);color:var(--muted)}
  .lvltxt{font-weight:800;color:var(--fg);font-size:.95rem;min-width:86px}
  .lvlmax{color:var(--muted);font-weight:600}
  .practstars{color:var(--star);font-weight:700}
  .prompt{
    background:var(--panel);border:2px solid var(--border);border-radius:20px;
    padding:26px 18px;text-align:center;font-size:2rem;font-weight:800;
    min-height:96px;display:flex;align-items:center;justify-content:center;line-height:1.25;
  }
  .hintbox{margin-top:10px;background:#fffbeb;border:2px solid #fcd34d;color:#92400e;
    border-radius:14px;padding:12px 14px;font-size:1rem}

  /* number answer + pad */
  .answerbox{
    margin:14px auto 10px;width:min(280px,90%);text-align:center;font-size:2.4rem;font-weight:800;
    border:3px dashed var(--accent);border-radius:16px;padding:10px;min-height:64px;background:var(--panel)
  }
  .answerbox .ph{color:var(--border)}
  .pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:340px;margin:0 auto}
  .key{
    appearance:none;border:2px solid var(--border);background:var(--panel);color:var(--fg);
    font-size:1.6rem;font-weight:800;border-radius:16px;padding:16px 0;cursor:pointer;
    box-shadow:var(--shadow);min-height:60px
  }
  .key:active{transform:translateY(2px)}
  .key.go{background:var(--good);border-color:var(--good);color:#fff}
  .key.del{background:#f3f4f6;color:#374151}

  /* choices */
  .choices{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:16px}
  .choice{
    appearance:none;border:2px solid var(--accent);background:var(--panel);color:var(--fg);
    font-size:1.7rem;font-weight:800;border-radius:16px;padding:22px 8px;cursor:pointer;box-shadow:var(--shadow)
  }
  .choice:active{transform:translateY(2px)}

  /* feedback */
  .feedback{margin-top:16px;border-radius:18px;padding:16px 16px;border:2px solid}
  .feedback.ok{background:var(--good-bg);border-color:var(--good)}
  .feedback.no{background:var(--bad-bg);border-color:var(--bad)}
  .cheer{font-size:1.4rem;font-weight:800;text-align:center}
  .correct-answer{text-align:center;margin-top:6px;font-size:1.1rem}
  .why{margin-top:12px;font-size:1.02rem;background:rgba(255,255,255,.6);border-radius:12px;padding:12px}
  .levelup{margin-top:12px;text-align:center;font-weight:800;color:var(--good);font-size:1.1rem}
  .leveldown{margin-top:12px;text-align:center;font-weight:700;color:var(--bad)}
  .next{
    display:block;width:100%;margin-top:16px;appearance:none;border:none;cursor:pointer;
    background:var(--accent);color:#fff;font-size:1.2rem;font-weight:800;border-radius:16px;padding:16px;box-shadow:var(--shadow)
  }
  .next:active{transform:translateY(2px)}
  .adjust{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:8px;margin-top:12px}
  .adjlbl{font-size:.85rem;color:var(--muted);width:100%;text-align:center}
  .adjbtn{appearance:none;cursor:pointer;border:2px solid var(--accent2);background:var(--panel);
    color:var(--accent2);font-weight:800;border-radius:12px;padding:10px 16px;font-size:1rem}
  .adjbtn:active{transform:translateY(1px)}
  .adjbtn:disabled{opacity:.35;cursor:default;border-color:var(--border);color:var(--muted)}

  /* test done */
  .done{text-align:center;padding:18px 8px}
  .done-emoji{font-size:3rem}
  .done-title{font-size:1.4rem;font-weight:800;margin-top:6px}
  .done-score{margin-top:8px;font-size:1.1rem}
  .done-level{margin-top:6px;font-size:1.1rem;color:var(--accent2)}
  .done .next{margin-top:18px}
  .done .hint{display:inline-block;margin-top:12px}

  /* ---------- Progress report ---------- */
  .grownups{
    display:block;width:100%;margin:18px auto 0;appearance:none;cursor:pointer;
    border:2px solid var(--border);background:var(--panel);color:var(--muted);
    border-radius:14px;padding:12px;font-size:.9rem;font-weight:700
  }
  .grownups:hover{border-color:var(--accent2);color:var(--accent2)}
  .report .topbar span{width:54px}
  .stats3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:6px 0 14px}
  .stat{background:var(--panel);border:2px solid var(--border);border-radius:16px;padding:12px 6px;text-align:center}
  .statnum{font-size:1.35rem;font-weight:800}
  .statlbl{font-size:.78rem;color:var(--muted);margin-top:2px}
  .callouts{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  @media(max-width:460px){.callouts{grid-template-columns:1fr}}
  .callout{border-radius:16px;padding:12px;border:2px solid}
  .callout.good{background:var(--good-bg);border-color:var(--good)}
  .callout.focus{background:var(--bad-bg);border-color:var(--bad)}
  .co-h{font-weight:800;font-size:.95rem;margin-bottom:8px}
  .co-b{display:flex;flex-wrap:wrap;gap:6px}
  .chip{font-size:.85rem;font-weight:700;background:var(--panel);border:1px solid var(--border);border-radius:999px;padding:5px 10px}
  .rlist{display:flex;flex-direction:column;gap:10px}
  .rrow{background:var(--panel);border:2px solid var(--border);border-radius:14px;padding:11px 13px}
  .rtop{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
  .rname{font-weight:800}
  .stretchtag{font-size:.68rem;font-weight:700;color:var(--accent2);border:1px solid var(--accent2);border-radius:6px;padding:1px 5px;vertical-align:middle}
  .rlvl{font-size:.85rem;color:var(--muted);white-space:nowrap}
  .rbest{color:var(--good)}
  .rbar{height:10px;background:var(--border);border-radius:999px;margin:8px 0 6px;overflow:hidden}
  .rfill{height:100%;border-radius:999px;background:var(--muted);transition:width .3s}
  .rfill.hi{background:var(--good)} .rfill.mid{background:var(--accent)} .rfill.lo{background:var(--bad)}
  .rmeta{font-size:.8rem;color:var(--muted)}
  .empty{margin:30px 8px;text-align:center;color:var(--muted);font-size:1.05rem;line-height:1.5}
  .resetwrap{margin-top:20px;text-align:center}
  .resetbtn{appearance:none;cursor:pointer;border:2px solid var(--border);background:transparent;
    color:var(--muted);border-radius:12px;padding:9px 14px;font-size:.85rem;font-weight:700}
  .resetbtn:hover{border-color:var(--bad);color:var(--bad)}
  .resetconfirm{background:var(--bad-bg);border:2px solid var(--bad);border-radius:14px;padding:14px;
    font-weight:700;color:#92400e}
  .resetconfirm>div{margin-top:10px;display:flex;gap:10px;justify-content:center}
  .danger{appearance:none;cursor:pointer;border:none;background:#dc2626;color:#fff;font-weight:800;
    border-radius:12px;padding:9px 16px;font-size:.9rem}

  /* ---------- Grade selector ---------- */
  .gradewrap{margin:6px 0 4px;text-align:center}
  .gradelbl{display:block;font-size:.8rem;color:var(--muted);font-weight:700;margin-bottom:6px}
  .grades{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
  .gchip{appearance:none;cursor:pointer;border:2px solid var(--border);background:var(--panel);
    color:var(--fg);font-weight:800;border-radius:999px;min-width:40px;padding:7px 10px;font-size:.9rem}
  .gchip.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .gchip:active{transform:translateY(1px)}

  /* compact level bar on topic cards */
  .card-bar{width:80%;height:7px;background:var(--border);border-radius:999px;overflow:hidden;margin:2px 0}
  .card-fill{height:100%;background:var(--accent);border-radius:999px}

  /* big buttons (Tutorials) */
  .bigbtn{display:block;width:100%;margin:18px 0 0;appearance:none;cursor:pointer;border:2px solid var(--accent2);
    background:var(--panel);color:var(--accent2);font-size:1.05rem;font-weight:800;border-radius:16px;padding:15px;box-shadow:var(--shadow)}
  .bigbtn:active{transform:translateY(2px)}

  /* ---------- Tutorials browser ---------- */
  .seg-row{display:flex;gap:8px;justify-content:center;margin:12px 0}
  .seg{appearance:none;cursor:pointer;border:2px solid var(--border);background:var(--panel);color:var(--muted);
    font-weight:800;border-radius:12px;padding:8px 14px;font-size:.9rem}
  .seg.on{border-color:var(--accent2);color:var(--accent2)}
  .llist{display:flex;flex-direction:column;gap:10px}
  .lcard{display:flex;align-items:center;gap:12px;text-align:left;appearance:none;cursor:pointer;
    border:2px solid var(--border);background:var(--panel);color:var(--fg);border-radius:16px;padding:13px 14px;box-shadow:var(--shadow)}
  .lcard:hover{border-color:var(--accent2)}
  .lcard:active{transform:translateY(2px)}
  .lemoji{font-size:1.8rem;line-height:1}
  .ltext{display:flex;flex-direction:column;flex:1;gap:2px}
  .ltitle{font-weight:800;font-size:1.02rem}
  .ldone{color:var(--good);font-size:.8rem;font-weight:800}
  .lgrades{font-size:.78rem;color:var(--muted)}
  .lgo{font-size:1.6rem;color:var(--muted);font-weight:800}

  /* ---------- Lesson viewer ---------- */
  .sdots{display:flex;gap:6px;justify-content:center;margin:6px 0 12px}
  .sdot{width:9px;height:9px;border-radius:50%;background:var(--border)}
  .sdot.on{background:var(--accent2)}
  .sdot.past{background:var(--good)}
  .lessfig{background:var(--panel);border:2px solid var(--border);border-radius:16px;padding:10px;margin-bottom:14px}
  .lessvg{display:block;width:100%;height:auto}
  .lesstext{font-size:1.12rem;line-height:1.5;text-align:center;padding:0 4px}
  .lessnav{display:flex;justify-content:space-between;align-items:center;margin-top:18px;gap:10px}
  .lnav{appearance:none;cursor:pointer;border:2px solid var(--accent);background:var(--panel);color:var(--accent);
    font-weight:800;border-radius:14px;padding:13px 20px;font-size:1.05rem}
  .lnav.next,.lnav.done{background:var(--accent);color:#fff}
  .lnav.done{background:var(--good);border-color:var(--good)}
  .lnav:active{transform:translateY(2px)}
  .practice-this{display:block;width:100%;margin-top:14px;appearance:none;cursor:pointer;border:2px solid var(--accent2);
    background:var(--panel);color:var(--accent2);font-weight:800;border-radius:14px;padding:13px;font-size:1rem}

  .key.wide{width:100%;margin-top:10px;max-width:340px;margin-left:auto;margin-right:auto;display:block}
  .key.dot:disabled{opacity:.3;cursor:default}
  .key.neg{background:#eef2ff;color:var(--accent2);font-weight:900}

  /* v3: ask, sprint, badges, settings */
  .toast{background:#fffbeb;border:2px solid var(--gold,#f59e0b);color:#92400e;border-radius:12px;padding:10px 12px;margin-bottom:10px;font-weight:800;text-align:center}
  .homerow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
  .bigbtn{display:block;width:100%;appearance:none;cursor:pointer;border:2px solid var(--accent2);background:var(--panel);
    color:var(--accent2);font-size:1.02rem;font-weight:800;border-radius:16px;padding:14px;box-shadow:var(--shadow)}
  .bigbtn.ask{border-color:var(--accent);color:var(--accent)}
  .bigbtn:active{transform:translateY(2px)}
  .homerow .bigbtn{margin-top:0}
  .topic-name{font-weight:800;font-size:1.05rem}
  .askinput{width:100%;font-size:1.1rem;padding:14px;border:2px solid var(--accent);border-radius:14px;margin:6px 0 10px;font-family:inherit}
  .askinput:focus{outline:3px solid #bcd2f2}
  .wideb{display:block;width:100%}
  .examples{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
  .chip2{border:2px solid var(--border);background:var(--panel);color:var(--muted);font-weight:700;border-radius:999px;padding:7px 12px;cursor:pointer;font-size:.85rem}
  .chip2:hover{border-color:var(--accent2);color:var(--accent2)}
  .answercard{margin-top:16px;background:var(--panel);border:2px solid var(--good,#16a34a);border-radius:16px;padding:16px;text-align:center}
  .acq{font-size:1.1rem;color:var(--muted)}
  .acv{font-size:2.2rem;font-weight:800;color:var(--good,#16a34a);margin:4px 0 8px}
  .acx{font-size:1rem;line-height:1.5;text-align:left;background:rgba(0,0,0,.03);border-radius:12px;padding:12px}
  .sprintbar{display:flex;justify-content:space-between;align-items:center;max-width:340px;margin:2px auto 10px;font-weight:800;font-size:1.1rem}
  .badges{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
  .badge2{display:flex;align-items:center;gap:8px;border:2px solid var(--border);border-radius:12px;padding:8px 10px;color:var(--muted);opacity:.7}
  .badge2.got{opacity:1;color:var(--fg);border-color:var(--gold,#f59e0b);background:var(--panel)}
  .b2e{font-size:1.3rem}.b2n{font-size:.82rem;font-weight:700}
  .toggles{display:flex;flex-direction:column;gap:8px}
  .toggle{display:flex;align-items:center;justify-content:space-between;border:2px solid var(--border);background:var(--panel);color:var(--fg);border-radius:12px;padding:12px 14px;font-weight:700;cursor:pointer}
  .toggle.on{border-color:var(--good,#16a34a)}
  .toggle .sw{font-size:.78rem;font-weight:800;color:var(--muted);border:2px solid var(--border);border-radius:999px;padding:2px 10px}
  .toggle.on .sw{color:#fff;background:var(--good,#16a34a);border-color:var(--good,#16a34a)}
  .bigbtn.quest{border-color:#16a34a;color:#16a34a}
  .bigbtn.mastery{border-color:var(--star);color:#b45309}
  /* ---------- Quest strip on home ---------- */
  .queststrip{display:flex;align-items:center;gap:10px;width:100%;margin-top:12px;appearance:none;cursor:pointer;
    border:2px solid var(--border);background:var(--panel);border-radius:14px;padding:8px 12px;box-shadow:var(--shadow)}
  .qs-badge{font-size:1.5rem}
  .qs-mid{flex:1;display:flex;flex-direction:column;gap:4px;text-align:left}
  .qs-name{font-weight:800;font-size:.9rem}
  .qs-bar{height:9px;background:var(--border);border-radius:999px;overflow:hidden}
  .qs-fill{display:block;height:100%;background:linear-gradient(90deg,#16a34a,#22c55e);border-radius:999px}
  .qs-pts{font-weight:800;color:#16a34a;font-size:.85rem;white-space:nowrap}
  /* ---------- Quest Board ---------- */
  .note2{font-size:.86rem;color:var(--muted);line-height:1.5;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:10px 12px;margin:6px 0}
  .empty2{color:var(--muted);font-size:.9rem;text-align:center;padding:8px}
  .levelcard{display:flex;align-items:center;gap:14px;background:var(--panel);border:2px solid #16a34a;border-radius:18px;padding:14px;box-shadow:var(--shadow)}
  .lvlbadge{font-size:2.6rem}
  .lvlinfo{flex:1}
  .lvlname{font-weight:800;font-size:1.05rem}
  .lvlbar{height:14px;background:var(--border);border-radius:999px;overflow:hidden;margin:6px 0}
  .lvlfill{height:100%;background:linear-gradient(90deg,#16a34a,#4ade80);border-radius:999px;transition:width .4s}
  .lvlsub{font-size:.84rem;color:var(--muted)}
  .qgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .qclaim{display:flex;align-items:center;gap:8px;appearance:none;cursor:pointer;border:2px solid var(--border);
    background:var(--panel);color:var(--fg);border-radius:14px;padding:12px;font-weight:700;text-align:left;box-shadow:var(--shadow)}
  .qclaim:hover{border-color:#16a34a}
  .qclaim:active{transform:translateY(2px)}
  .qem{font-size:1.3rem}
  .qlb{flex:1;font-size:.9rem}
  .qpts{font-weight:800;color:#16a34a;font-size:.85rem}
  .qpendlist,.qloglist{display:flex;flex-direction:column;gap:8px}
  .qpend{display:flex;align-items:center;justify-content:space-between;gap:8px;border:2px dashed var(--bad,#d97706);
    background:var(--bad-bg,#fef3c7);border-radius:12px;padding:10px 12px}
  .qpend .qlb small{color:var(--muted);font-weight:700}
  .qpbtns,.qapprove{display:flex;align-items:center;gap:6px}
  .mini{appearance:none;cursor:pointer;border:2px solid var(--border);background:var(--panel);color:var(--fg);
    font-weight:800;border-radius:10px;padding:6px 10px;font-size:.82rem}
  .mini.ok{border-color:#16a34a;color:#16a34a}
  .pinp{width:78px;border:2px solid var(--accent);border-radius:10px;padding:6px 8px;font-size:1rem;font-family:inherit;text-align:center;letter-spacing:2px}
  .pinrow{display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap}
  .pinok{color:#16a34a;font-weight:800;font-size:.85rem}
  .qlog{display:flex;align-items:center;justify-content:space-between;border:1px solid var(--border);border-radius:10px;padding:8px 12px;font-size:.9rem}

  .mcounts{display:flex;justify-content:center;gap:14px;font-weight:800;font-size:1.15rem;margin:6px 0 4px}
  .mlist{display:flex;flex-direction:column;gap:10px}
  .mcard{border:2px solid var(--border);background:var(--panel);border-radius:14px;padding:12px;box-shadow:var(--shadow)}
  .mhead{display:flex;align-items:center;gap:8px}
  .mem{font-size:1.3rem}
  .mlbl{flex:1;font-weight:800}
  .mtier{font-size:.8rem;font-weight:800;border-radius:999px;padding:3px 10px;border:2px solid var(--border);color:var(--muted)}
  .mtier.t1{color:#b45309;border-color:#d8a26a;background:#fdf3e7}
  .mtier.t2{color:#64748b;border-color:#cbd5e1;background:#f1f5f9}
  .mtier.t3{color:#b8860b;border-color:#f0c64a;background:#fef9e7}
  .mtier.t4{color:#0ea5e9;border-color:#7dd3fc;background:#e8f7fe}
  .mbar{height:12px;background:var(--border);border-radius:999px;overflow:hidden;margin:8px 0}
  .mfill{height:100%;border-radius:999px;background:var(--muted);transition:width .4s}
  .mfill.t1{background:#d8a26a}.mfill.t2{background:#94a3b8}.mfill.t3{background:#f0c64a}.mfill.t4{background:#38bdf8}
  .mmeta{display:flex;justify-content:space-between;font-size:.8rem;color:var(--muted);font-weight:700}
  /* ---------- Celebration ---------- */
  .celebrate{position:relative;overflow:hidden;text-align:center;background:linear-gradient(135deg,#16a34a,#22c55e);
    color:#fff;border-radius:16px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow);animation:pop .35s ease-out}
  .celeb-t{font-size:1.15rem;font-weight:800}
  .celeb-s{font-size:.9rem;opacity:.95;margin-top:2px}

  .confetti.r{right:12px}.confetti:not(.r){left:12px}
  @keyframes pop{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}

([2,3],"blue : gold = 2 : 3")},{text:"Proportions keep the ratio the same as the numbers grow. 2:3 is the same as 4:6 and 6:9 \u2014 multiply both sides equally.",svg:kt([4,6],"4 : 6 (same as 2 : 3)")},{text:"To split 15 in a 2:3 ratio: 2 + 3 = 5 parts, each part = 15 \xF7 5 = 3, so the amounts are 6 and 9.",svg:kt([6,9],"6 : 9 \u2014 split of 15")}]},{id:"coordplane",title:"The Coordinate Plane",emoji:"\u{1F4CD}",grades:[6,7,8],topic:"slope",steps:[{text:"Two number lines cross to make a grid. The flat one is the x-axis, the upright one is the y-axis; they meet at (0, 0).",svg:ye({pts:[[0,0,"(0,0)"]]})},{text:"A point is written (x, y): go ACROSS x first, then UP y. Here is (3, 2): right 3, up 2.",svg:ye({pts:[[3,2,"(3,2)"]]})},{text:"Negative coordinates go left or down. (\u22124, \u22123) means left 4, down 3.",svg:ye({pts:[[-4,-3,"(\u22124,\u22123)"],[3,2,"(3,2)"]]})}]},{id:"sqroots",title:"Square Roots",emoji:"\u2733\uFE0F",grades:[8,9],topic:"roots",steps:[{text:"Squaring means multiplying a number by itself: 4\xB2 = 4 \xD7 4 = 16. A square root undoes that.",svg:St(4)},{text:"\u221A16 asks 'what number times itself makes 16?' \u2014 it's 4. The area of this square is 16, and each side is \u221A16 = 4.",svg:St(4)},{text:"\u221A49 = 7 because 7 \xD7 7 = 49. Perfect squares (like 1, 4, 9, 16, 25, 36, 49) have whole-number roots.",svg:St(7)}]},{id:"slope_line",title:"Slope of a Line",emoji:"\u2197\uFE0F",grades:[8,9],topic:"slope",steps:[{text:"Slope measures how steep a line is: rise \xF7 run (how far UP for each step ACROSS).",svg:ye({line:[[-2,-1],[2,3]],pts:[[-2,-1],[2,3]]})},{text:"From (1, 1) to (3, 7): the line rises 6 and runs 2, so slope = 6 \xF7 2 = 3. A bigger slope is steeper.",svg:ye({line:[[-1,-3],[2,3]],pts:[[1,1,"(1,1)"],[2,3,"(2,3)"]]})},{text:"A line going DOWN to the right has a NEGATIVE slope. A flat line has slope 0.",svg:ye({line:[[-3,3],[3,-3]]})}]},{id:"pythagoras",title:"The Pythagorean Theorem",emoji:"\u{1F4D0}",grades:[8,9,10],topic:"py
